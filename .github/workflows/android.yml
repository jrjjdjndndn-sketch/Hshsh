name: Android CI Build

on:
  push:
    branches: [main, master]
    paths:
      - 'AndroidAIGamePlayer.zip'
      - '.github/workflows/android.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Unzip Android project
        run: |
          if [ ! -f "AndroidAIGamePlayer.zip" ]; then
            echo "AndroidAIGamePlayer.zip not found in repo root"
            exit 1
          fi
          unzip -q AndroidAIGamePlayer.zip
          ls -la AndroidAIGamePlayer

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        run: gradle assembleDebug
        working-directory: ./AndroidAIGamePlayer

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-game-player-debug
          path: AndroidAIGamePlayer/app/build/outputs/apk/debug/*.apk
