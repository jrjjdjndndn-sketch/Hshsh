name: Android Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Inspect zip contents
        run: |
          if [ ! -f "AndroidAIGamePlayer.zip" ]; then
            echo "AndroidAIGamePlayer.zip not found in repo root"
            exit 1
          fi
          unzip -l AndroidAIGamePlayer.zip | head -40

      - name: Unzip Android project
        run: |
          rm -rf AndroidAIGamePlayer
          unzip -o -q AndroidAIGamePlayer.zip
          chmod -R +rx AndroidAIGamePlayer
          ls -la AndroidAIGamePlayer/

      - name: Decode signing keystore
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          if [ -n "$SIGNING_KEY_BASE64" ]; then
            echo "$SIGNING_KEY_BASE64" | base64 -d > AndroidAIGamePlayer/app/keystore.jks
            chmod +r AndroidAIGamePlayer/app/keystore.jks
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -f "app/keystore.jks" ]; then
            gradle assembleRelease
          else
            echo "No signing keystore provided, building unsigned release APK"
            gradle assembleRelease
          fi
        working-directory: ./AndroidAIGamePlayer

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-game-player-release-${{ github.event.inputs.version }}
          path: AndroidAIGamePlayer/app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event.inputs.version != ''
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          files: AndroidAIGamePlayer/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
